services:
  postgres:
    image: postgres:17.5-alpine3.20
    container_name: multi-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      # Postgres only auto-creates ONE DB via POSTGRES_DB.
      # We create two DBs below using init scripts.
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:

